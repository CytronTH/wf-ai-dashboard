<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Debug Tool</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            display: inline-block;
        }

        .status-badge.connected {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .log-container {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-header {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .log-header h3 {
            margin: 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .log-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 13px;
        }

        .message-row {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(51, 65, 85, 0.5);
            word-break: break-all;
        }

        .message-time {
            color: var(--text-muted);
            font-size: 11px;
            margin-right: 10px;
        }

        .message-topic {
            color: var(--primary);
            font-weight: bold;
            display: inline-block;
            margin-right: 10px;
        }
        
        .message-topic.sys {
            color: var(--success);
        }

        .message-payload {
            color: #e2e8f0;
            margin-top: 4px;
            white-space: pre-wrap;
        }

        .active-subs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .sub-tag {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-tag span {
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            line-height: 1;
        }
        
        .sub-tag span:hover {
            color: var(--danger);
        }
        
        /* Auto-scroll toggle */
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
        }
        
        .toggle-switch input {
            cursor: pointer;
            accent-color: var(--primary);
        }

    </style>
</head>
<body>

    <h1>
        <svg fill="currentColor" width="24" height="24" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        MQTT Debug Tool
    </h1>

    <div class="controls">
        <label for="topicInput" style="font-size: 14px; font-weight: bold; color: var(--text-muted);">Topic:</label>
        <input type="text" id="topicInput" placeholder="e.g. +/sys/status or #" value="#">
        <button class="btn-primary" id="subscribeBtn">Subscribe</button>
        <div style="flex: 1;"></div>
        <div class="status-badge" id="wsStatus">● Disconnected</div>
        
        <div style="width: 100%;" id="activeSubsContainer" class="active-subs">
            <!-- Subscribed topics will appear here -->
        </div>
    </div>

    <div class="log-container">
        <div class="log-header">
            <h3>Event Log</h3>
            <div style="display: flex; gap: 15px; align-items: center;">
                <label class="toggle-switch">
                    <input type="checkbox" id="autoScroll" checked>
                    Auto-scroll
                </label>
                <button class="btn-danger" id="clearBtn" style="padding: 4px 10px; font-size: 12px;">Clear</button>
            </div>
        </div>
        <div class="log-messages" id="logMessages">
            <div style="color: var(--text-muted); font-style: italic;">Connect to the server and subscribe to a topic to see events...</div>
        </div>
    </div>

    <script>
        let ws;
        const wsStatus = document.getElementById('wsStatus');
        const topicInput = document.getElementById('topicInput');
        const subscribeBtn = document.getElementById('subscribeBtn');
        const logMessages = document.getElementById('logMessages');
        const activeSubsContainer = document.getElementById('activeSubsContainer');
        const clearBtn = document.getElementById('clearBtn');
        const autoScroll = document.getElementById('autoScroll');
        
        let subscriptions = new Set();
        let isFirstMessage = true;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/mqtt-debug`;
            
            wsStatus.textContent = "● Connecting...";
            wsStatus.className = "status-badge";
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                wsStatus.textContent = "● Connected";
                wsStatus.className = "status-badge connected";
                
                // Re-subscribe if we had active subscriptions
                subscriptions.forEach(topic => {
                    ws.send(JSON.stringify({ action: "subscribe", topic: topic }));
                });
            };

            ws.onmessage = (event) => {
                if (isFirstMessage) {
                    logMessages.innerHTML = ''; // clear initial placeholder
                    isFirstMessage = false;
                }
                
                try {
                    const data = JSON.parse(event.data);
                    appendLog(data.topic, data.payload);
                } catch(e) {
                    appendLog("error", "Failed to parse websocket message");
                }
            };

            ws.onclose = () => {
                wsStatus.textContent = "● Disconnected";
                wsStatus.className = "status-badge";
                setTimeout(connect, 3000); // Auto reconnect
            };

            ws.onerror = (err) => {
                console.error("WebSocket Error: ", err);
                ws.close();
            };
        }

        function appendLog(topic, payload) {
            const time = new Date().toISOString().split('T')[1].slice(0, 12); // HH:mm:ss.SSS
            const row = document.createElement('div');
            row.className = 'message-row';
            
            let prettyPayload = payload;
            try {
                // Try to pretty-print JSON if possible
                const parsed = JSON.parse(payload);
                prettyPayload = JSON.stringify(parsed, null, 2);
            } catch(e) {
                // Not JSON, keep as is
            }
            
            const topicClass = topic === "sys" ? "message-topic sys" : "message-topic";
            
            row.innerHTML = `
                <div>
                    <span class="message-time">[${time}]</span>
                    <span class="${topicClass}">${topic}</span>
                </div>
                <div class="message-payload">${escapeHtml(prettyPayload)}</div>
            `;
            
            logMessages.appendChild(row);
            
            if (autoScroll.checked) {
                logMessages.scrollTop = logMessages.scrollHeight;
            }
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
        
        function renderTags() {
            activeSubsContainer.innerHTML = '';
            subscriptions.forEach(topic => {
                const tag = document.createElement('div');
                tag.className = 'sub-tag';
                tag.innerHTML = `${escapeHtml(topic)} <span title="Unsubscribe">&times;</span>`;
                tag.querySelector('span').onclick = () => {
                    if(ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ action: "unsubscribe", topic: topic }));
                    }
                    subscriptions.delete(topic);
                    renderTags();
                };
                activeSubsContainer.appendChild(tag);
            });
        }

        subscribeBtn.addEventListener('click', () => {
            const topic = topicInput.value.trim();
            if(!topic) return;
            
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "subscribe", topic: topic }));
                subscriptions.add(topic);
                renderTags();
                topicInput.value = '';
            } else {
                alert("WebSocket is not connected.");
            }
        });

        topicInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                subscribeBtn.click();
            }
        });

        clearBtn.addEventListener('click', () => {
            logMessages.innerHTML = '';
        });

        // Start connection
        connect();
    </script>
</body>
</html>
