<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WF AOI System - Main Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#3b82f6',
                        ok: '#10b981',
                        ng: '#ef4444'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .plane-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .plane-card:hover:not(.disabled) {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
            z-index: 10;
        }

        .disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }
    </style>
</head>

<body class="h-screen w-screen p-6 flex flex-col gap-6 bg-dark text-slate-100 overflow-hidden relative">

    <!-- Background Decor -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[50%] bg-teal-600/10 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header -->
    <header
        class="glass rounded-2xl p-5 flex justify-between items-center shadow-2xl flex-none border-b border-gray-700/50">
        <div>
            <h1
                class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-teal-300 to-emerald-400">
                WF AOI System
            </h1>
            <p class="text-gray-400 mt-1 text-xs font-medium uppercase tracking-widest">Global Supervision Hub</p>
        </div>

        <div class="flex gap-4">
            <!-- Refresh Button -->
            <button onclick="window.location.reload();"
                class="bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 border border-blue-500/30 rounded-xl px-4 py-2 flex items-center justify-center gap-2 transition-all shadow-inner group">
                <i class="fa-solid fa-rotate-right group-hover:rotate-180 transition-transform duration-500"></i>
                <span class="text-xs font-bold uppercase tracking-wider">Refresh</span>
            </button>
            <div
                class="text-center bg-black/40 px-4 py-2 rounded-xl border border-gray-700/50 flex flex-col justify-center shadow-inner">
                <div class="text-gray-500 text-[10px] uppercase tracking-wider mb-1 font-bold">System Status</div>
                <div id="connection-status"
                    class="text-yellow-400 font-bold text-sm flex items-center justify-center gap-2">
                    <div
                        class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse shadow-[0_0_8px_rgba(250,204,21,0.8)]">
                    </div>
                    Connecting...
                </div>
            </div>
        </div>
    </header>

    <!-- Main Grid -->
    <main
        class="flex-1 w-full max-w-[1600px] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8 pb-4">

        <!-- Plane 1 (Dual Camera) -->
        <div class="plane-card glass rounded-2xl overflow-hidden flex flex-col group relative border-2 border-gray-700/50 bg-gray-800/30">
            <div class="p-4 flex justify-between items-center border-b border-gray-700/50 bg-black/20">
                <h2 class="text-xl font-bold tracking-wider flex items-center gap-3">
                    <i class="fa-solid fa-microchip text-blue-400"></i> Plane 1
                </h2>
                <div class="flex items-center gap-3">
                    <button onclick="toggleGpio('0,1', this)" data-cameras="0,1" class="gpio-toggle bg-gray-700/50 hover:bg-gray-600/50 text-gray-500 rounded-full w-8 h-8 flex items-center justify-center transition-colors shadow-inner relative z-20" title="Toggle GPIO Trigger">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                    <span id="badge-plane-1"
                        class="status-badge px-3 py-1 rounded-full text-xs font-black tracking-widest bg-gray-600 text-white shadow-md transition-colors duration-300">WAIT</span>
                </div>
            </div>
            <!-- Dual feeds wrapper -->
            <div class="flex-1 grid grid-cols-2 gap-1 bg-black/80 p-1 min-h-[250px]">
                
                <!-- Cam A (ID 0) -->
                <a href="/camera?id=0" class="relative bg-black flex items-center justify-center overflow-hidden rounded-l-xl cursor-pointer hover:opacity-90 transition-opacity">
                    <img id="img-0" src="" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500" alt="Plane 1 Cam A">
                    <div class="placeholder flex flex-col items-center gap-2 text-gray-500 z-10">
                        <i class="fa-solid fa-camera opacity-50"></i>
                        <span class="text-[10px] font-medium tracking-widest uppercase">Cam A</span>
                    </div>
                </a>

                <!-- Cam B (ID 1) -->
                <a href="/camera?id=1" class="relative bg-black flex items-center justify-center overflow-hidden rounded-r-xl cursor-pointer hover:opacity-90 transition-opacity">
                    <img id="img-1" src="" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500" alt="Plane 1 Cam B">
                    <div class="placeholder flex flex-col items-center gap-2 text-gray-500 z-10">
                        <i class="fa-solid fa-camera opacity-50"></i>
                        <span class="text-[10px] font-medium tracking-widest uppercase">Cam B</span>
                    </div>
                </a>

            </div>
        </div>

        <!-- Plane 2 (Dual Camera) -->
        <div class="plane-card glass rounded-2xl overflow-hidden flex flex-col group relative border-2 border-gray-700/50 bg-gray-800/30">
            <div class="p-4 flex justify-between items-center border-b border-gray-700/50 bg-black/20">
                <h2 class="text-xl font-bold tracking-wider flex items-center gap-3">
                    <i class="fa-solid fa-microchip text-blue-400"></i> Plane 2
                </h2>
                <div class="flex items-center gap-3">
                    <button onclick="toggleGpio('2,3', this)" data-cameras="2,3" class="gpio-toggle bg-gray-700/50 hover:bg-gray-600/50 text-gray-500 rounded-full w-8 h-8 flex items-center justify-center transition-colors shadow-inner relative z-20" title="Toggle GPIO Trigger">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                    <span id="badge-plane-2"
                        class="status-badge px-3 py-1 rounded-full text-xs font-black tracking-widest bg-gray-600 text-white shadow-md transition-colors duration-300">WAIT</span>
                </div>
            </div>
            <!-- Dual feeds wrapper -->
            <div class="flex-1 grid grid-cols-2 gap-1 bg-black/80 p-1 min-h-[250px]">
                
                <!-- Cam C (ID 2) -->
                <a href="/camera?id=2" class="relative bg-black flex items-center justify-center overflow-hidden rounded-l-xl cursor-pointer hover:opacity-90 transition-opacity">
                    <img id="img-2" src="" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500" alt="Plane 2 Cam A">
                    <div class="placeholder flex flex-col items-center gap-2 text-gray-500 z-10">
                        <i class="fa-solid fa-camera opacity-50"></i>
                        <span class="text-[10px] font-medium tracking-widest uppercase">Cam A</span>
                    </div>
                </a>

                <!-- Cam D (ID 3) -->
                <a href="/camera?id=3" class="relative bg-black flex items-center justify-center overflow-hidden rounded-r-xl cursor-pointer hover:opacity-90 transition-opacity">
                    <img id="img-3" src="" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500" alt="Plane 2 Cam B">
                    <div class="placeholder flex flex-col items-center gap-2 text-gray-500 z-10">
                        <i class="fa-solid fa-camera opacity-50"></i>
                        <span class="text-[10px] font-medium tracking-widest uppercase">Cam B</span>
                    </div>
                </a>

            </div>
        </div>

        <!-- Plane 3 (Active) -->
        <a href="/camera?id=4"
            class="plane-card glass rounded-2xl overflow-hidden flex flex-col group relative cursor-pointer border-2 border-gray-700/50 bg-gray-800/30">
            <div class="p-4 flex justify-between items-center border-b border-gray-700/50 bg-black/20">
                <h2 class="text-xl font-bold tracking-wider flex items-center gap-3">
                    <i class="fa-solid fa-microchip text-blue-400"></i> Plane 3
                </h2>
                <div class="flex items-center gap-3">
                    <button onclick="toggleGpio('4', this)" data-cameras="4" class="gpio-toggle bg-gray-700/50 hover:bg-gray-600/50 text-gray-500 rounded-full w-8 h-8 flex items-center justify-center transition-colors shadow-inner relative z-20" title="Toggle GPIO Trigger">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                    <span id="badge-4"
                        class="status-badge px-3 py-1 rounded-full text-xs font-black tracking-widest bg-gray-600 text-white shadow-md transition-colors duration-300">WAIT</span>
                </div>
            </div>
            <div class="flex-1 relative bg-black/60 flex items-center justify-center overflow-hidden min-h-[250px]">
                <img id="img-4" src=""
                    class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500"
                    alt="Plane 3 view">
                <div class="placeholder flex flex-col items-center gap-3 text-gray-500 z-10">
                    <i class="fa-solid fa-camera fa-2x opacity-50"></i>
                    <span class="text-sm font-medium tracking-widest uppercase">Awaiting Feed</span>
                </div>
                <!-- Overlay Gradient -->
                <div
                    class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent opacity-80 z-0">
                </div>
            </div>
        </a>

        <!-- Plane 4 (Active) -->
        <a href="/camera?id=5"
            class="plane-card glass rounded-2xl overflow-hidden flex flex-col group relative cursor-pointer border-2 border-gray-700/50 bg-gray-800/30">
            <div class="p-4 flex justify-between items-center border-b border-gray-700/50 bg-black/20">
                <h2 class="text-xl font-bold tracking-wider flex items-center gap-3">
                    <i class="fa-solid fa-microchip text-blue-400"></i> Plane 4
                </h2>
                <div class="flex items-center gap-3">
                    <button onclick="toggleGpio('5', this)" data-cameras="5" class="gpio-toggle bg-gray-700/50 hover:bg-gray-600/50 text-gray-500 rounded-full w-8 h-8 flex items-center justify-center transition-colors shadow-inner relative z-20" title="Toggle GPIO Trigger">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                    <span id="badge-5"
                        class="status-badge px-3 py-1 rounded-full text-xs font-black tracking-widest bg-gray-600 text-white shadow-md transition-colors duration-300">WAIT</span>
                </div>
            </div>
            <div class="flex-1 relative bg-black/60 flex items-center justify-center overflow-hidden min-h-[250px]">
                <img id="img-5" src=""
                    class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500"
                    alt="Plane 4 view">
                <div class="placeholder flex flex-col items-center gap-3 text-gray-500 z-10">
                    <i class="fa-solid fa-camera fa-2x opacity-50"></i>
                    <span class="text-sm font-medium tracking-widest uppercase">Awaiting Feed</span>
                </div>
                <!-- Overlay Gradient -->
                <div
                    class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent opacity-80 z-0">
                </div>
            </div>
        </a>

        <!-- Plane 5 (Active) -->
        <a href="/camera?id=6"
            class="plane-card glass rounded-2xl overflow-hidden flex flex-col group relative cursor-pointer border-2 border-gray-700/50 bg-gray-800/30 lg:col-start-2">
            <div class="p-4 flex justify-between items-center border-b border-gray-700/50 bg-black/20">
                <h2 class="text-xl font-bold tracking-wider flex items-center gap-3">
                    <i class="fa-solid fa-microchip text-blue-400"></i> Plane 5
                </h2>
                <div class="flex items-center gap-3">
                    <button onclick="toggleGpio('6', this)" data-cameras="6" class="gpio-toggle bg-gray-700/50 hover:bg-gray-600/50 text-gray-500 rounded-full w-8 h-8 flex items-center justify-center transition-colors shadow-inner relative z-20" title="Toggle GPIO Trigger">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                    <span id="badge-6"
                        class="status-badge px-3 py-1 rounded-full text-xs font-black tracking-widest bg-gray-600 text-white shadow-md transition-colors duration-300">WAIT</span>
                </div>
            </div>
            <div class="flex-1 relative bg-black/60 flex items-center justify-center overflow-hidden min-h-[250px]">
                <img id="img-6" src=""
                    class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500"
                    alt="Plane 5 view">
                <div class="placeholder flex flex-col items-center gap-3 text-gray-500 z-10">
                    <i class="fa-solid fa-camera fa-2x opacity-50"></i>
                    <span class="text-sm font-medium tracking-widest uppercase">Awaiting Feed</span>
                </div>
                <!-- Overlay Gradient -->
                <div
                    class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent opacity-80 z-0">
                </div>
            </div>
        </a>

    </main>

    <script>
        let ws;

        function connectWS() {
            const host = window.location.hostname;
            const port = window.location.port;
            const wsUrl = `ws://${host}:${port}/ws`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                const statusEl = document.getElementById('connection-status');
                statusEl.innerHTML = '<div class="w-2.5 h-2.5 rounded-full bg-ok shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div> Active';
                statusEl.className = 'text-ok font-bold text-sm flex items-center justify-center gap-2 tracking-wider uppercase';
            };

            ws.onclose = () => {
                const statusEl = document.getElementById('connection-status');
                statusEl.innerHTML = '<div class="w-2.5 h-2.5 rounded-full bg-ng shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div> Offline';
                statusEl.className = 'text-ng font-bold text-sm flex items-center justify-center gap-2 tracking-wider uppercase';
                setTimeout(connectWS, 2000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                updateHubUI(data);
            };
        }

        // We only care about tracking global NG vs OK for thumbnails
        const cardStatusTracker = {};

        // Object to track sub-camera status for dual planes
        const dualPlaneTracker = {
            plane1: { cam0: 'OK', cam1: 'OK' },
            plane2: { cam2: 'OK', cam3: 'OK' }
        };

        function updateHubUI(data) {
            const { camera_id, image_id, status, image } = data;
            const camIdInt = parseInt(camera_id);

            // Validate camera_id is valid (0 to 6)
            if (camIdInt < 0 || camIdInt > 6) return;

            const imgEl = document.getElementById(`img-${camera_id}`);
            
            // Determine the badge element (group by plane)
            let badgeEl;
            let groupPlaneId = null;
            
            if (camIdInt === 0 || camIdInt === 1) {
                // Plane 1 (Dual Camera)
                badgeEl = document.getElementById(`badge-plane-1`);
                groupPlaneId = 'plane1';
            } else if (camIdInt === 2 || camIdInt === 3) {
                // Plane 2 (Dual Camera)
                badgeEl = document.getElementById(`badge-plane-2`);
                groupPlaneId = 'plane2';
            } else if (camIdInt >= 4 && camIdInt <= 6) {
                // Plane 3, 4, 5 (Single Camera per plane)
                badgeEl = document.getElementById(`badge-${camera_id}`);
            }

            const cardEl = imgEl?.closest('.plane-card');

            if (!imgEl || !badgeEl || !cardEl) return;

            if (image_id === 'pre_crop' || image_id === 'raw_image') {
                // Determine final status
                let finalStatus = 'OK';
                
                if (groupPlaneId) {
                    // It's a dual camera plane
                    // Update the sub-camera tracking first based on previous round's tracking
                    let subStatus = cardStatusTracker[camera_id] === 'NG' ? 'NG' : 'OK';
                    dualPlaneTracker[groupPlaneId][`cam${camera_id}`] = subStatus;
                    
                    // Final status for a dual plane is NG if ANY of its sub-cameras are NG
                    if (Object.values(dualPlaneTracker[groupPlaneId]).includes('NG')) {
                        finalStatus = 'NG';
                    }
                } else {
                    // It's a single camera plane
                    if (cardStatusTracker[camera_id] === 'NG') {
                        finalStatus = 'NG';
                    }
                }

                // Update Badge visually for the finished round
                if (finalStatus === 'OK') {
                    badgeEl.innerText = 'OK';
                    badgeEl.className = 'status-badge px-3 py-1 rounded-full text-xs font-black tracking-widest bg-ok/20 text-ok border border-ok/50 shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all';
                    cardEl.classList.remove('border-gray-700/50', 'border-ng');
                    cardEl.classList.add('border-ok');
                } else if (finalStatus === 'NG') {
                    badgeEl.innerText = 'NG';
                    badgeEl.className = 'status-badge px-3 py-1 rounded-full text-xs font-black tracking-widest bg-ng text-white shadow-[0_0_15px_rgba(239,68,68,0.6)] transition-all';
                    cardEl.classList.remove('border-gray-700/50', 'border-ok');
                    cardEl.classList.add('border-ng');
                }

                // Reset tracker for new round (only for the camera that got the pre_crop)
                cardStatusTracker[camera_id] = 'OK';

                // Update Thumbnail visually
                imgEl.src = image;
                if (imgEl.classList.contains('opacity-0')) {
                    imgEl.classList.remove('opacity-0');
                    const placeholder = imgEl.parentElement.querySelector('.placeholder');
                    if (placeholder) placeholder.style.display = 'none';
                }

            } else {
                // If any crop is NG, the individual camera's global status for this round is NG
                if (status === 'NG') {
                    cardStatusTracker[camera_id] = 'NG';
                }
            }
        }

        // Initialize
        connectWS();
        
        // GPIO Logic
        let globalGpioConfig = {};

        async function fetchGpioConfig() {
            try {
                const res = await fetch('/api/config/gpio');
                if (res.ok) {
                    globalGpioConfig = await res.json();
                    updateGpioButtons();
                }
            } catch (e) {
                console.error("Failed to fetch GPIO config", e);
            }
        }

        function updateGpioButtons() {
            document.querySelectorAll('.gpio-toggle').forEach(btn => {
                const cameras = btn.dataset.cameras.split(',');
                const isEnabled = cameras.some(cam => globalGpioConfig[cam] === true);
                
                if (isEnabled) {
                    btn.classList.add('text-yellow-400', 'bg-yellow-400/20', 'border', 'border-yellow-400/50');
                    btn.classList.remove('text-gray-500', 'bg-gray-700/50', 'border', 'border-gray-700/50');
                } else {
                    btn.classList.remove('text-yellow-400', 'bg-yellow-400/20', 'border', 'border-yellow-400/50');
                    btn.classList.add('text-gray-500', 'bg-gray-700/50', 'border', 'border-gray-700/50');
                }
            });
        }

        async function toggleGpio(camerasStr, btn) {
            if(window.event) window.event.preventDefault(); // Stop click from bubbling up to the plane card <a> tag
            
            const cameras = camerasStr.split(',');
            const currentlyEnabled = cameras.some(cam => globalGpioConfig[cam] === true);
            const newState = !currentlyEnabled;
            
            cameras.forEach(cam => { globalGpioConfig[cam] = newState; });
            updateGpioButtons();
            
            try {
                const updatePayload = {};
                cameras.forEach(cam => { updatePayload[cam] = newState; });
                
                await fetch('/api/config/gpio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ settings: updatePayload })
                });
            } catch (e) {
                console.error("Failed to update GPIO config", e);
                cameras.forEach(cam => { globalGpioConfig[cam] = !newState; });
                updateGpioButtons();
            }
        }

        fetchGpioConfig();
    </script>
</body>

</html>
